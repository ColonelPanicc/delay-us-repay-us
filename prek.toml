[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "check-added-large-files" },
  { id = "check-case-conflict" },
  { id = "end-of-file-fixer" },
  { id = "forbid-new-submodules" },
  { id = "check-toml", exclude = "Cargo.toml" },
  { id = "check-json" },
  { id = "check-vcs-permalinks" },
  { id = "check-yaml" },
  { id = "check-xml" },
  { id = "mixed-line-ending" },
  { id = "check-symlinks" },
  { id = "destroyed-symlinks" },
  { id = "detect-private-key" },
  { id = "check-shebang-scripts-are-executable" },
  { id = "check-executables-have-shebangs" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "cargo-fmt",
    name = "cargo fmt",
    language = "system",
    entry = "cargo fmt --all",
    types = ["rust"],
    pass_filenames = false,
  },
  {
    id = "cargo-clippy",
    name = "cargo clippy pedantic",
    language = "system",
    entry = "cargo clippy --verbose -- -D warnings -W clippy::pedantic",
    types = ["rust"],
    pass_filenames = false,
  },
  {
    id = "cargo-machete",
    name = "cargo machete",
    language = "system",
    entry = "cargo machete",
    types = ["rust"],
    pass_filenames = false,
  },
  {
    id = "cargo-deny-check-advisories",
    name = "cargo deny check advisories",
    language = "system",
    entry = "cargo deny check advisories",
    types = ["rust"],
    pass_filenames = false,
  }
]
